<ng-container matColumnDef="Date105">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>105</th>
    <td mat-cell *matCellDef="let element; index as i;"
        [style.backgroundColor]="(element.Date105Name=='Sunday') ? 'red' : ''">
        <div *ngIf="i==0">
            <input [ngModel]="element.Date105 | date:'yyyy-MM-dd'" style="text-align: right;"
                   (ngModelChange)="ProductionOrderProductionPlanDate105($event, element)"
                   [ngModelOptions]="{ updateOn: 'blur' }" type="date" class="form-control"
                   autocomplete="off">
            <!-- <b style="font-size: 18px; color: #000;">{{element.Date105 | date:'dd/MM/yyyy'}}</b> -->
            <div style="font-size: 14px; color: #000;">{{element.Date105Name}}</div>
        </div>
        <div *ngIf="i>0" style="text-align: right;">
            <input class="form-control" type="number" name="Quantity105{{element.ID}}"
                   [(ngModel)]="element.Quantity105">
        </div>
    </td>
</ng-container>
<ng-container matColumnDef="QuantityActual105">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Actual</th>
    <td mat-cell *matCellDef="let element; index as i;"
        style="text-align: right; color: green;">
        <div *ngIf="element.Quantity105>0 && i>0">
            <b>{{element.QuantityActual105 | number:'1.0-0'}}</b>
        </div>
    </td>
</ng-container>
<ng-container matColumnDef="QuantityGAP105">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>GAP</th>
    <td mat-cell *matCellDef="let element; index as i;" style="text-align: right; color: red;">
        <div *ngIf="element.Quantity105>0 && i>0">
            <b>{{element.QuantityGAP105 | number:'1.0-0'}}</b>
        </div>
    </td>
</ng-container>
<ng-container matColumnDef="Active105">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Active</th>
    <td mat-cell *matCellDef="let element; index as i;">
        <label *ngIf="i>0">
            <input class="form-check-input" type="checkbox" name="Active105{{element.ID}}"
                   [(ngModel)]="element.Active105">
            <span></span>
        </label>
    </td>
</ng-container>
