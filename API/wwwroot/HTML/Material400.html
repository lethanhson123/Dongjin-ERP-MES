<body style="background-color:#ffffff; margin: 0px; margin: auto; margin-top: 0px !important; font-family: Arial;">
    <style>
        .arrow-left {
            border-top: 30px solid transparent;
            border-bottom: 30px solid transparent;
            border-right: 30px solid #000000;
        }

        .arrow-right {
            border-top: 30px solid transparent;
            border-bottom: 30px solid transparent;
            border-left: 30px solid #000000;
        }

        .arrow-up {
            border-left: 30px solid transparent;
            border-right: 30px solid transparent;
            border-bottom: 30px solid #000000;
        }

        .arrow-down {
            border-left: 30px solid transparent;
            border-right: 30px solid transparent;
            border-top: 30px solid #000000;
        }
    </style>
    <div style="width: 400px; height: 200px; margin: auto; font-size: 12px; border-bottom: 0px solid #000000; font-weight: bold; line-height: 12px; padding-top: 10px; padding-bottom: 10px; font-family: Arial; ">

            <tr>

                </td>

                    <a href='javascript:window.print();' title="Print" style="text-decoration: none;"><img width="180" height="180" src="[FileName]"></a>
