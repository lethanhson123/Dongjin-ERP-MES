<style>
    a {
        text-decoration: none;
    }

    .border, .border td, .border th {
        border-color: #000000;
        border-style: solid;
        border-width: 1px;
        padding: 10px;
        font-size: 20px;
    }        

    .border {
        border-collapse: collapse;
        width: 100%;
    }
</style>
<div style="width: 1040px; height: 1520px; margin: auto; border: 0px solid red; font-family: Arial; font-size: 16px; padding: 10px; position: absolute;">
    <table class="border">
        <thead>
            <tr>
                <th>NO</th>
                <th>Project NAME</th>
                <th>PART NO</th>
                <th>SNP</th>
                <th>BOX QTY</th>
                <th>QTY</th>
                <th>PO CODE</th>
            </tr>
        </thead>
        <tbody>
            [List]
        </tbody>
    </table>
    <div style="position: absolute; bottom: 0; left: 0;">
        <table style="width: 100%;">
            <tbody>
                <tr>
                    <td valign="bottom" style="width: 80%;">
                        <div style="border: 1px solid #000000; font-size: 80px; font-weight: bold; text-align: center; height: 180px; display: flex; justify-content: center; align-items: center;">
                            [PARTGRP]
                        </div>
                    </td>
                    <td valign="bottom" style="width: 20%; text-align: center; font-size: 20px; font-weight: bold;">
                        Pallet NO
                        <a href='javascript:window.print();' title="Print" style="text-decoration: none;"><img width="150" height="150" src="[QRCodePALLLETNO]" /></a>
                    </td>
                </tr>
            </tbody>
        </table>
        <div style="border: 1px solid #000000; font-size: 80px; font-weight: bold; text-align: center; padding: 10px;">
            [PALLLETNO]
        </div>
        <hr />
        <table style="width: 100%;">
            <tbody>
                <tr>
                    <td style="width: 50%; text-align: left; font-size: 20px;">
                        [PrintDate]
                    </td>
                    <td style="width: 50%; text-align: right; font-size: 20px;">
                        [PrintTime]
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
