<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/x-icon" href="/image/logo.png">
    <meta property="og:image" itemprop="thumbnailUrl" content="/image/logo.png" />
    <meta property="og:image:width" content="800" />
    <meta property="og:image:height" content="600" />
    <meta name="twitter:image" content="/image/logo.png" />
    <link rel="apple-touch-icon-precomposed" href="/image/logo.png" sizes="72x72">
    <link rel="apple-touch-icon-precomposed" href="/image/logo.png" sizes="144x144">
    <link rel="apple-touch-icon-precomposed" href="/image/logo.png" sizes="57x57">
    <link rel="apple-touch-icon-precomposed" href="/image/logo.png" sizes="114x114">
    <link rel="nokia-touch-icon" href="/image/logo.png">
    <link rel="apple-touch-icon-precomposed" href="/image/logo.png" sizes="1x1">
    <title>
        DONGJIN GLOBAL COMPANY LIMITED
    </title>
    <meta name="description" content="DONGJIN GLOBAL COMPANY LIMITED | Manufacturing Execution System (MES)" />


</head>
<body style="background-color:#ffffff; margin:0px;">
    <style>
        a {
            text-decoration: none;
        }

        body {
            font-family: 'Arial';
            font-size: 12px;
        }

        .border, .border td, .border th {
            border-color: #000000;
            border-style: solid;
            border-width: 1px;
            padding: 2px;
            text-align: center;
        }

        .border {
            border-collapse: collapse;
            width: 100%;
        }
    </style>
    <div style="width: 400px; height: auto; margin: auto; font-size: 12px; border: 1px solid #000000; line-height: 14px; font-family: Arial;">
        <div>
            <div style="font-size: 24px; font-weight: bold; line-height: 40px;">
                PN: [TC_PART_NM]
            </div>
            <div style="font-size: 24px; font-weight: bold; line-height: 40px; ">
                DE: [TC_DESC]
            </div>
            <table style="width: 100%;">
                <tbody>
                    <tr>
                        <td valign="top" style="width: 50%;">
                            <div style="font-size: 24px; font-weight: bold; line-height: 40px; ">
                                Q: [QTY] ([Barcode_SEQ])
                            </div>
                            <div style="font-size: 24px; font-weight: bold; line-height: 40px; ">
                                LOC: [TC_LOC]
                            </div>
                        </td>
                        <td valign="top" style="width: 20%;">
                            <img src="[QRCodeFileName]" width="70" height="70" />
                        </td>
                        <td valign="top" style="width: 30%;">
                            <div style="background-color: #000000; color: #ffffff;">
                                <div style="font-size: 16px; text-align: center;">[TTC_PO_DT]</div>
                                <div style="font-size: 40px; text-align: center; ">[TTC_PO_DT2]</div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div style="font-size: 10px; font-weight: bold;">RE: [TTC_BARCODENM]</div>
        </div>
    </div>

</body>
</html>
