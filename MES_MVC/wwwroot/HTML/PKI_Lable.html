<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Print_Packing_Lable</title>
    <link href="../lib/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .label {
            width: 500px;
            height: 440px;
            padding: 0px;
            font-size: 14px;
        }

        .table {
            width: 100%;
            height: 100%;
            padding: 5px;
        }

        .big-text {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
        }

        .mv-title {
            font-size: 55px;
            font-weight: bold;
            text-align: center;
        }

        .part-no {
            font-size: 35px;
            font-weight: bold;
            text-align: center;
        }

        .vertical-text {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            text-align: center;
            font-size: 18px;
        }

        .barcode {
            width: 100%;
            height: 60px;
        }

        .qrcode {         
            margin: 0px;
        }

        .border-top {
            border-top: 2px solid black; /* Độ dày 3px, kiểu nét đứt */
        }

        .border-bottom {
            border-bottom: 2px solid black; /* Độ dày 3px, kiểu nét đứt */
        }

        .border-left {
            border-left: 2px solid black; /* Độ dày 3px, kiểu nét đứt */
        }

        td.border-bottom {
            position: relative;
        }

            td.border-bottom::after {
                content: "";
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                border-bottom: 3px solid black;
            }
    </style>
</head>
<body onload="window.print()">
    <div class="label">
        <table border="0" class="table">
            <tr>
                <td colspan="2" class="mv-title " style="height:10px;">
                    <div id="Family">
                    </div>
                </td>
                <td rowspan="2" align="center" class="border-left" style="height:80px;">
                    <div style="font-weight:bold">SERIAL NO</div>
                    <div id="qrcode_serial" class="qrcode"></div>
                </td>
            </tr>
            <tr>
                <td colspan="2" class="border-bottom" style="height:60px;">
                    <div style="font-weight:bold">PART NO</div>
                    <div class="row ">
                        <div class="col-2">
                            <div id="qrcode_partno" class="qrcode"></div>
                        </div>
                        <div class="col-10 part-no" id="partNo"></div>
                    </div>
                </td>
            </tr>
            <tr>
                <td colspan="2" class="border-bottom" style="height:60px;">
                    <div class="row">
                        <div class="col-2" style="font-weight:bold">MFG./SHIP DATE</div>
                        <div class="big-text col-10" id="mfgDate"></div>
                    </div>
                    <div class="row">
                        <div class="col-2" style="font-weight:bold">DESC.</div>
                        <div class="col-10">
                            <div class="row">
                                <div class="big-text col-6" id="description"></div>
                                <div class="big-text col-6" id="line"></div>
                            </div>
                        </div>
                 
                    </div>
                </td>
                <td rowspan="3" align="center" class="border-left">
                    <img src="../Image/djlogo3.png" class="logo" style="width:80px; height:210px; margin-top:40px;" />
                </td>
            </tr>
            <tr>
                <td colspan="2" class="border-bottom" style="height:60px;">
                    <div class="row" style="align-content:center;">
                        <div class="col-4" style="font-weight:bold">QUANTITY (Q)</div>
                        <div class="col-8">
                            <div class="row">
                                <div style="text-align:center;" class="col-8">
                                    <svg id="barcode" class="barcode"></svg>
                                </div>
                                <div class="col-4">
                                    <div class="big-text" id="quantity"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </td>
            </tr>
            <tr>
                <td colspan="2" style="height:60px;">
                    <div class="row">
                        <div class="col-2" style="font-weight:bold">SERIAL NO</div>
                        <div class="col-10">
                            <div class="big-text co12" id="serialNo"></div>
                            <div style="text-align:center;" class="col-12">
                                <svg id="SRBarcode" class="barcode"></svg>
                            </div>
                        </div>                     
                    </div>
                </td>
            </tr>
        </table>
    </div>


    <script>
        window.onload = function () {
            const params = new URLSearchParams(window.location.search);        
            document.getElementById("serialNo").innerText = params.get("SerialNo") || " ";
            document.getElementById("partNo").innerText = params.get("PartNo") || " ";
            document.getElementById("mfgDate").innerText = params.get("MfgDate") || " ";
            document.getElementById("description").innerText = params.get("Description") || " ";
            document.getElementById("line").innerText = params.get("Line") || " ";
            document.getElementById("quantity").innerText = params.get("Quantity") || " ";    

            new QRCode(document.getElementById("qrcode_serial"), { text: params.get("SerialNo") || "", width: 80, height: 80 });
            new QRCode(document.getElementById("qrcode_partno"), { text: "P" + params.get("PartNo") || "", width: 70, height: 70 });   

            JsBarcode("#barcode", "Q   " + params.get("Quantity") || "", { format: "CODE128", displayValue: false, width: 2, height: 60 });  
            JsBarcode("#SRBarcode", params.get("SerialNo") || "", { format: "CODE128", displayValue: false, width: 2, height: 60 });

            setTimeout(() => {
                window.print();
                setTimeout(() => {
                    window.close(); // Đóng tab sau khi in
                }, 1000); // Đợi 1 giây trước khi đóng để tránh lỗi
            }, 500);
        };
    </script>

    <script src="../lib/bootstrap/dist/js/bootstrap.min.js"></script>
    <script src="/js/qrcode.min.js"></script>
    <script src="/js/JsBarcode.all.min.js"></script>

</body>
</html>
