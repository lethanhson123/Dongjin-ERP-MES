<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Print_Packing_Lable</title>
    <link href="../lib/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .label {
            width: 500px;
            height: 440px;
            padding: 0px;
            font-size: 14px;
        }

        .table {
            width: 100%;
            height: 100%;
            padding: 5px;
        }

        .big-text {
            font-size: 35px;
            font-weight: bold;
            text-align: left;
        }
        .sn-text {
            font-size: 30px;
            font-weight: bold;
            text-align: center;
        }


        .part-text {
            font-size: 40px;
            font-weight: bold;
            text-align: left;
        }

        .Desc-text {
            font-size: 18px;
            font-weight: bold;
            text-align: left;
            margin-left:20px;
        }

        .mv-title {
            font-size: 80px;
            font-weight: bold;
            text-align: left;
            height:60px;
            margin-top:-30px;
            margin-left:30px;
        }

        .part-no {
            font-size: 45px;
            font-weight: bold;
            text-align: center;
        }

        .date-text {
            font-size: 30px;
            font-weight: bold;
            text-align: left;
            margin-left: 20px;
        }

        .vertical-text {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            text-align: center;
            font-size: 18px;
        }

        .barcode {
            width: 160px;
            height: 70px;
            margin-left: -40px;
        }

        .qrcode {
            width: 80px;
            height: 80px;
            margin: 5px;
        }

        .border-top {
            border-top: 2px solid black; /* Độ dày 3px, kiểu nét đứt */
        }

        .border-bottom {
            border-bottom: 2px solid black; /* Độ dày 3px, kiểu nét đứt */
        }

        .border-left {
            border-left: 2px solid black; /* Độ dày 3px, kiểu nét đứt */
        }

        td.border-bottom {
            position: relative;
        }

            td.border-bottom::after {
                content: "";
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                border-bottom: 2px solid black;
            }
    </style>
</head>
<body onload="window.print()">
    <div class="label">
        <table class="table">
            <tr >
                <td colspan="2" style="height:60px;">
                    <div id="Family" class="mv-title">
                    </div>
                </td>
                <td rowspan="2" align="center" class="border-left" style="height:70px;">
                    <div style="font-weight:bold; margin-top:40px;">SERIAL NO</div>
                    <div id="qrcode_serial" class="qrcode"></div>
                </td>
            </tr>
            <tr>
                <td colspan="2" class="border-bottom" style="height:55px;">
                    <div style="font-weight:bold">PART NO</div>
                    <div class="row ">
                        <div class="col-2">
                            <div id="qrcode_partno" class="qrcode"></div>
                        </div>
                        <div class="col-10 part-no" id="partNo"></div>
                    </div>
                </td>
            </tr>
            <tr >
                <td colspan="2" class="border-bottom" style="height:60px;">
                    <div class="row">
                        <div class="col-2" style="font-weight:bold">MFG./SHIP DATE</div>
                        <div class="date-text col-8" id="mfgDate"></div>
                    </div>
                    <div class="row">
                        <div class="col-2" style="font-weight:bold">DESC.</div>
                        <div class="col-10" style="font-size: 25px; font-weight: bold; text-align: center; " id="description"></div>
                    </div>
                </td>
                <td rowspan="3" align="center" class="border-left">
                    <img src="../Image/djlogo3.png" class="logo" style="width:80px; height:210px;" />
                </td>
            </tr>
            <tr >
                <td colspan="2" class="border-bottom">
                    <div class="row" style="align-content:center; height:60px;">
                        <div class="col-4" style="font-weight:bold">QUANTITY<br />(Q)</div>
                        <div class="col-8">
                            <div class="row">
                                <div style="text-align:left;" class="col-6">
                                    <svg id="barcode" class="barcode"></svg>
                                </div>
                                <div class="col-3" style="text-align:left;">
                                    <div class="big-text" id="quantity"></div>
                                </div>
                            </div>
                        </div>                       
                    </div>
                </td>
            </tr>
            <tr >
                <td colspan="2">
                    <div class="row" style="height:60px;">
                        <div class="col-2" style="font-weight:bold">SERIAL NO</div>
                        <div class="sn-text col-10" id="serialNo"></div>
                    </div>
                </td>
            </tr>
        </table>
    </div>

    <div class="label" style="page-break-before: always;">
        <table class="table">
            <tr>
                <td colspan="2" style="height:60px;">
                    <div id="Family1" class="mv-title">
                    </div>
                </td>
                <td rowspan="2" align="center" class="border-left" style="height:70px;">
                    <div style="font-weight:bold; margin-top:40px;">SERIAL NO</div>
                    <div id="qrcode_serial1" class="qrcode"></div>
                </td>
            </tr>
            <tr>
                <td colspan="2" class="border-bottom" style="height:55px;">
                    <div style="font-weight:bold">PART NO</div>
                    <div class="row ">
                        <div class="col-2">
                            <div id="qrcode_partno1" class="qrcode"></div>
                        </div>
                        <div class="col-10 part-no" id="partNo1"></div>
                    </div>
                </td>
            </tr>
            <tr>
                <td colspan="2" class="border-bottom" style="height:60px;">
                    <div class="row">
                        <div class="col-2" style="font-weight:bold">MFG./SHIP DATE</div>
                        <div class="date-text col-8" id="mfgDate1"></div>
                    </div>
                    <div class="row">
                        <div class="col-2" style="font-weight:bold">DESC.</div>
                        <div class="col-10" style="font-size: 25px; font-weight: bold; text-align: center; " id="description1"></div>
                    </div>
                </td>
                <td rowspan="3" align="center" class="border-left">
                 
                    <img src="../Image/djlogo3.png" class="logo" style="width:80px; height:210px;" />
                </td>
            </tr>
            <tr>
                <td colspan="2" class="border-bottom">
                    <div class="row" style="align-content:center; height:60px;">
                        <div class="col-4" style="font-weight:bold">QUANTITY<br />(Q)</div>
                        <div class="col-8">
                            <div class="row">
                                <div style="text-align:left;" class="col-6">
                                    <svg id="barcode1" class="barcode"></svg>
                                </div>
                                <div class="col-3" style="text-align:left;">
                                    <div class="big-text" id="quantity1"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <div class="row" style="height:60px;">
                        <div class="col-2" style="font-weight:bold">SERIAL NO</div>
                        <div class="sn-text col-10" id="serialNo1"></div>
                    </div>
                </td>
            </tr>
        </table>
    </div>

    <script>
        window.onload = function () {
            const params = new URLSearchParams(window.location.search);
            document.getElementById("Family").innerText = params.get("Family") || "N/A";
            document.getElementById("serialNo").innerText = params.get("SerialNo") || "N/A";
            document.getElementById("partNo").innerText = params.get("PartNo") || "N/A";
            document.getElementById("mfgDate").innerText = params.get("MfgDate") || "N/A";
            document.getElementById("description").innerText = (params.get("Description") || " ").substring(0,12) + "  " + (params.get("Line") || " ").substring(0,12);
            document.getElementById("quantity").innerText = params.get("Quantity") || "N/A";

            document.getElementById("Family1").innerText = params.get("Family") || "N/A";
            document.getElementById("serialNo1").innerText = params.get("SerialNo") || "N/A";
            document.getElementById("partNo1").innerText = params.get("PartNo") || "N/A";
            document.getElementById("mfgDate1").innerText = params.get("MfgDate") || "N/A";
            document.getElementById("description1").innerText = (params.get("Description") || " ").substring(0, 12) + "  " + (params.get("Line") || " ").substring(0, 12);
            document.getElementById("quantity1").innerText = params.get("Quantity") || "N/A";


            new QRCode(document.getElementById("qrcode_serial"), { text: params.get("SerialNo") || "", width: 80, height: 80 });
            new QRCode(document.getElementById("qrcode_serial1"), { text: params.get("SerialNo") || "", width: 80, height: 80 });
            new QRCode(document.getElementById("qrcode_partno"), { text: "P" + (params.get("PartNo") || ""), width: 70, height: 70 });
            new QRCode(document.getElementById("qrcode_partno1"), { text: "P" + (params.get("PartNo") || ""), width: 70, height: 70 });

            JsBarcode("#barcode","Q   " + params.get("Quantity") || "", { format: "CODE128", displayValue: false, width: 2, height: 70 });
            JsBarcode("#barcode1", "Q   " + params.get("Quantity") || "", { format: "CODE128", displayValue: false, width: 2, height: 70 });

            setTimeout(() => {
                window.print();
                setTimeout(() => {
                    window.close(); // Đóng tab sau khi in
                }, 1000); // Đợi 1 giây trước khi đóng để tránh lỗi
            }, 500);
        };
    </script>

    <script src="../lib/bootstrap/dist/js/bootstrap.min.js"></script>
    <script src="/js/qrcode.min.js"></script>
    <script src="/js/JsBarcode.all.min.js"></script>

</body>
</html>
