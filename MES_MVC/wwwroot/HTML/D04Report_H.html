<style>
    a {
        text-decoration: none;
    }

    .border, .border td, .border th {
        border-color: #000000;
        border-style: solid;
        border-width: 1px;
        padding: 2px;
        font-size: 30px;
    }

    .border {
        border-collapse: collapse;
        width: 100%;
    }
</style>
<div style="width: 1500px; height: 1000px; margin: auto; border: 0px solid red; font-family: Arial; font-size: 16px; padding: 10px; position: absolute; ">
    <table class="border">
        <thead>
            <tr>
                <th rowspan="2" style="font-size: 50px;">NO</th>
                <th style="font-size: 50px;">Project NAME</th>
                <th style="font-size: 50px;">QTY</th>
            </tr>
            <tr>
                <th style="font-size: 50px;">PART NO</th>
                <th style="font-size: 50px;">BOX</th>
            </tr>
        </thead>
        <tbody>
            [List]
        </tbody>
    </table>
    <div style="position: absolute; bottom: 0; left: 0; width: 100%;">
        <table style="width: 100%;">
            <tbody>
                <tr>
                    <td valign="bottom" style="width: 50%;">
                        <div style="border: 1px solid #000000; font-size: 100px; font-weight: bold; text-align: center; padding: 10px; height: 160px;">
                            [PART_NM]
                        </div>
                    </td>
                    <td valign="bottom" style="width: 30%; ">
                        <div style="border: 1px solid #000000; font-size: 100px; font-weight: bold; text-align: center; padding: 10px; height: 160px;">
                            [SHIPNO]
                        </div>
                    </td>
                    <td valign="bottom" style="width: 20%; text-align: center; font-size: 20px; font-weight: bold;">
                        <a href='javascript:window.print();' title="Print" style="text-decoration: none;"><img width="150" height="150" src="[QRCodePALLLETNO]" /></a>
                    </td>
                </tr>
            </tbody>
        </table>
        <div style="border: 1px solid #000000; font-size: 120px; font-weight: bold; text-align: center; padding: 10px;">
            [PALLLETNO]
        </div>
        <hr />
        <table style="width: 100%;">
            <tbody>
                <tr>
                    <td style="width: 50%; text-align: left; font-size: 20px;">
                        [PrintDate]
                    </td>
                    <td style="width: 50%; text-align: right; font-size: 20px;">
                        [PrintTime]
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
