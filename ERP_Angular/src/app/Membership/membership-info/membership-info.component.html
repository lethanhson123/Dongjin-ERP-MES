<div class="pt-2 pb-0" id="breadcrumbs-wrapper">
    <div class="container">
        <div class="row">
            <div class="col s12 m6 l6">
                <h6 class="breadcrumbs-title">
                    Membership
                </h6>
            </div>
            <div class="col s12 m6 l6 right-align-md">
                <ol class="breadcrumbs mb-0">
                    <li class="breadcrumb-item">
                        <a href="javascript:history.back()" title="Back">
                            <<< Back </a>
                    </li>
                    <li class="breadcrumb-item">
                        <a routerLink="/Homepage" title="Home">Home</a>
                    </li>
                    <li class="breadcrumb-item">
                        <a routerLink="/MembershipInfo" title="Membership">Membership</a>
                    </li>
                </ol>
            </div>
        </div>
    </div>
</div>
<div class="card card card-default scrollspy">
    <div class="card-content">
        <div class="row">

            <div class="col s12 m12 l10">
                <h6 style="color: red;" *ngIf="MembershipService.BaseResult">{{MembershipService.BaseResult.Message}}
                </h6>
            </div>
            <div class="col s12 m12 l1">
                <label>
                    <input disabled type="checkbox" class="form-check-input" name="Active"
                        [(ngModel)]="MembershipService.BaseParameter.BaseModel.Active" />
                    <span>Active</span>
                </label>
            </div>
            <div class="col s12 m12 l1">
                <button title="Save" class="btn waves-effect waves-light cyan" style="width: 100%;" (click)="Save()"><i
                        class="material-icons">save</i></button>
            </div>
        </div>
        <div class="row">
            <div class="col s4 m4 l4">
                <div class="row">
                    <div class="col s4 m4 l4">
                        <label>ID</label>
                    </div>
                    <div class="col s8 m8 l8">
                        <input disabled placeholder="ID" [(ngModel)]="MembershipService.BaseParameter.BaseModel.ID"
                            type="number" class="form-control">
                    </div>
                </div>
                <div class="row">
                    <div class="col s4 m4 l4">
                        <label>Full Name</label>
                    </div>
                    <div class="col s8 m8 l8">
                        <input placeholder="Name" [(ngModel)]="MembershipService.BaseParameter.BaseModel.Name"
                            type="text" class="form-control">
                    </div>
                </div>
                <div class="row">
                    <div class="col s4 m4 l4">
                        <label>Email</label>
                    </div>
                    <div class="col s8 m8 l8">
                        <input placeholder="Email" [(ngModel)]="MembershipService.BaseParameter.BaseModel.Email"
                            type="text" class="form-control">
                    </div>
                </div>
                <div class="row">
                    <div class="col s4 m4 l4">
                        <label>Phone</label>
                    </div>
                    <div class="col s8 m8 l8">
                        <input placeholder="Phone" [(ngModel)]="MembershipService.BaseParameter.BaseModel.Phone"
                            type="text" class="form-control">
                    </div>
                </div>
            </div>
            <div class="col s4 m4 l4">
                <div class="row">
                    <div class="col s4 m4 l4">
                        <label>USER_IDX</label>
                    </div>
                    <div class="col s8 m8 l8">
                        <input disabled placeholder="USER_IDX"
                            [(ngModel)]="MembershipService.BaseParameter.BaseModel.USER_IDX" type="number"
                            class="form-control">
                    </div>
                </div>
                <div class="row">
                    <div class="col s4 m4 l4">
                        <label>UserName</label>
                    </div>
                    <div class="col s8 m8 l8">
                        <input placeholder="UserName" [(ngModel)]="MembershipService.BaseParameter.BaseModel.UserName"
                            type="text" class="form-control">
                    </div>
                </div>
                <div class="row">
                    <div class="col s4 m4 l4">
                        <label>Password</label>
                    </div>
                    <div class="col s8 m8 l8">
                        <input placeholder="Password" [(ngModel)]="MembershipService.BaseParameter.BaseModel.Password"
                            type="text" class="form-control">
                    </div>
                </div>
                <div class="row">
                    <div class="col s4 m4 l4">
                        <label>Note</label>
                    </div>
                    <div class="col s8 m8 l8">
                        <input placeholder="Note" [(ngModel)]="MembershipService.BaseParameter.BaseModel.Note"
                            type="text" class="form-control">
                    </div>
                </div>
            </div>
            <div class="col s4 m4 l4">
                <div class="row">
                    <div class="col s4 m4 l4">
                        <label>Company</label>
                    </div>
                    <div class="col s8 m8 l8">
                        <input disabled placeholder="Company"
                            [(ngModel)]="MembershipService.BaseParameter.BaseModel.CompanyName" type="text"
                            class="form-control">
                    </div>
                </div>
                <div class="row">
                    <div class="col s4 m4 l4">
                        <label>Department</label>
                    </div>
                    <div class="col s8 m8 l8">
                        <input disabled placeholder="Department"
                            [(ngModel)]="MembershipService.BaseParameter.BaseModel.CategoryDepartmentName" type="text"
                            class="form-control">
                    </div>
                </div>
                <div class="row">
                    <div class="col s4 m4 l4">
                        <label>Position</label>
                    </div>
                    <div class="col s8 m8 l8">
                        <input disabled placeholder="Position"
                            [(ngModel)]="MembershipService.BaseParameter.BaseModel.CategoryPositionName" type="text"
                            class="form-control">
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<app-loading *ngIf="MembershipService.IsShowLoading"></app-loading>
