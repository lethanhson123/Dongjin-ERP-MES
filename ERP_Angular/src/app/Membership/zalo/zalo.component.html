<div class="pt-2 pb-0" id="breadcrumbs-wrapper">
    <div class="container">
        <div class="row">
            <div class="col s12 m6 l6">
                <h6 class="breadcrumbs-title">
                    Zalo
                </h6>
            </div>
            <div class="col s12 m6 l6 right-align-md">
                <ol class="breadcrumbs mb-0">
                    <li class="breadcrumb-item">
                        <a href="javascript:history.back()" title="Back">
                            <<< Back </a>
                    </li>
                    <li class="breadcrumb-item">
                        <a routerLink="/Homepage" title="Home">Home</a>
                    </li>
                    <li class="breadcrumb-item">
                        <a routerLink="/Zalo" title="Zalo">Zalo ZNS</a>
                    </li>
                </ol>
            </div>
        </div>
    </div>
</div>
<div class="col s12 m12 l12">
    <div class="card card card-default scrollspy">
        <div class="card-content">
            <div class="col s12 m12 l6">
                <input [(ngModel)]="ZaloZNSService.BaseParameter.SearchString" placeholder="Phone..."
                    class="form-control" (keyup.enter)="ZaloZNSSend()">
            </div>
            <div class="col s12 m12 l1">
                <button title="send" (click)="ZaloZNSSend()" class="btn waves-effect waves-light green darken-1"
                    style="width: 100%;">
                    <i class="material-icons">send</i>
                </button>
            </div>
            <div class="col s12 m6 l1">
                    <label><a style="cursor: pointer;" class="link-primary" target="_blank"
                            href="{{URLTemplate}}">Download</a></label>
                </div>
                <div class="col s12 m6 l3">
                    <input class="form-control" type="file" (change)="ZaloZNSChange($event, $event.target.files)">
                </div>
                <div class="col s12 m12 l1">
                    <button title="Save BOM Raw Material" class="btn waves-effect waves-light cyan" style="width: 100%;"
                        (click)="Save()"><i class="material-icons">save</i></button>
                </div>
        </div>
    </div>
</div>
<app-loading *ngIf="ZaloZNSService.IsShowLoading"></app-loading>
