<div class="pt-2 pb-0" id="breadcrumbs-wrapper">
    <div class="container">
        <div class="row">
            <div class="col s12 m6 l6">
                <h6 class="breadcrumbs-title">
                    Zalo Token
                    <span *ngIf="ZaloTokenService.List">({{ZaloTokenService.List.length}} items)</span>
                </h6>
            </div>
            <div class="col s12 m6 l6 right-align-md">
                <ol class="breadcrumbs mb-0">
                    <li class="breadcrumb-item">
                        <a href="javascript:history.back()" title="Back">
                            <<< Back </a>
                    </li>
                    <li class="breadcrumb-item">
                        <a routerLink="/Homepage" title="Home">Home</a>
                    </li>
                    <li class="breadcrumb-item">
                        <a routerLink="/ZaloToken" title="ZaloToken">ZaloToken</a>
                    </li>
                </ol>
            </div>
        </div>
    </div>
</div>
<div class="col s12 m12 l12">
    <div class="card card card-default scrollspy">
        <div class="card-content">
            <div class="col s12 m12 l11">
                <input [(ngModel)]="ZaloTokenService.BaseParameter.SearchString" placeholder="Search..."
                    class="form-control" (keyup.enter)="ZaloTokenSearch()">
            </div>
            <div class="col s12 m12 l1">
                <button title="search" (click)="ZaloTokenSearch()" class="btn waves-effect waves-light green darken-1"
                    style="width: 100%;">
                    <i class="material-icons">search</i>
                </button>
            </div>
            <div class="KhungOverflow">
                <table *ngIf="!NotificationService.IsMobile" mat-table matSort #ZaloTokenSort="matSort"
                    [dataSource]="ZaloTokenService.DataSource">
                    <ng-container matColumnDef="No">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header>
                            No
                        </th>
                        <td mat-cell *matCellDef="let element; index as i;">
                            <div *ngIf="ZaloTokenPaginator">
                                {{ZaloTokenPaginator.pageSize *
                                ZaloTokenPaginator.pageIndex + i + 1}}
                            </div>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="ID">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header>ID
                        </th>
                        <td mat-cell *matCellDef="let element">
                            {{element.ID}}
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="Date">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header>Date
                        </th>
                        <td mat-cell *matCellDef="let element">
                            <input [ngModel]="element.Date | date:'yyyy-MM-dd'" style="text-align: right;"
                                (ngModelChange)="Date(element,$event)" [ngModelOptions]="{ updateOn: 'blur' }"
                                type="date" class="form-control" autocomplete="off">
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="AppID">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header>APP ID
                        </th>
                        <td mat-cell *matCellDef="let element">
                            <input class="form-control" type="text" placeholder="APP ID" name="AppID{{element.ID}}"
                                [(ngModel)]="element.AppID">
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="SecretKey">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header>Secret key
                        </th>
                        <td mat-cell *matCellDef="let element">
                            <input class="form-control" type="text" placeholder="Secret key"
                                name="SecretKey{{element.ID}}" [(ngModel)]="element.SecretKey">
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="URL">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header>URL
                        </th>
                        <td mat-cell *matCellDef="let element">
                            <input class="form-control" type="text" placeholder="URL" name="URL{{element.ID}}"
                                [(ngModel)]="element.URL">
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="OARefreshToken">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header>Refresh token
                        </th>
                        <td mat-cell *matCellDef="let element">
                            <input class="form-control" type="text" placeholder="Refresh token"
                                name="OARefreshToken{{element.ID}}" [(ngModel)]="element.OARefreshToken">
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="OAAccessToken">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header>Access token
                        </th>
                        <td mat-cell *matCellDef="let element">
                            <input class="form-control" type="text" placeholder="Access token"
                                name="OAAccessToken{{element.ID}}" [(ngModel)]="element.OAAccessToken">
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="Note">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header>Note
                        </th>
                        <td mat-cell *matCellDef="let element">
                            <input class="form-control" type="text" placeholder="Note" name="Note{{element.ID}}"
                                [(ngModel)]="element.Note">
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="Active">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header>Active
                        </th>
                        <td mat-cell *matCellDef="let element">
                            <label>
                                <input class="form-check-input" type="checkbox" name="Active{{element.ID}}"
                                    [(ngModel)]="element.Active">
                                <span></span>
                            </label>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="Save">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header>
                        </th>
                        <td mat-cell *matCellDef="let element">
                            <button (click)="ZaloTokenSave(element)" class="btn waves-effect waves-light cyan"
                                title="Save"><i class="material-icons">save</i></button>&nbsp;&nbsp;&nbsp;
                            <button *ngIf="element.ID>0" (click)="ZaloTokenDelete(element)"
                                class="btn-floating waves-effect waves-light red" title="Delete"><i
                                    class="material-icons">delete_outline</i></button>
                        </td>
                    </ng-container>
                    <tr mat-header-row *matHeaderRowDef="ZaloTokenService.DisplayColumns002">
                    </tr>
                    <tr mat-row *matRowDef="let row; columns: ZaloTokenService.DisplayColumns002;">
                    </tr>
                </table>
                <mat-paginator *ngIf="!NotificationService.IsMobile" #ZaloTokenPaginator="matPaginator"
                    [pageSizeOptions]="[10,20,50,100]" [pageSize]="20" [showFirstLastButtons]></mat-paginator>
            </div>
        </div>
    </div>
</div>
<app-loading *ngIf="ZaloTokenService.IsShowLoading"></app-loading>
